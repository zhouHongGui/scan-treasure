# Build Android app packages for GitHub downloads.
# - Push to main/master: packages are uploaded to the "latest" GitHub Release.
# - Push a tag like v1.0.0: packages are uploaded to that versioned GitHub Release.
name: Build App Downloads

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: app-downloads-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npm run type-check

      - name: Build web and sync Android
        working-directory: web
        run: |
          npm run build
          npx cap sync android

      - name: Build debug APK
        working-directory: web/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build signed release APK when secrets exist
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p ../../app-artifacts/android
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            mkdir -p "$RUNNER_TEMP/android-signing"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/release.jks"
            export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/android-signing/release.jks"
            ./gradlew assembleRelease --no-daemon
          else
            echo "Android release APK was not built because signing secrets are not configured. Debug APK is available." > ../../app-artifacts/android/android-release-not-built.txt
          fi

      - name: Collect Android packages
        run: |
          mkdir -p app-artifacts/android
          debug_apk="$(find web/android/app/build/outputs -type f -path "*/apk/debug/*.apk" | head -n 1 || true)"
          if [ -n "$debug_apk" ]; then
            cp "$debug_apk" app-artifacts/android/ScanTreasure-Android-Debug.apk
          fi

          release_apk="$(find web/android/app/build/outputs -type f -path "*/apk/release/*.apk" ! -name "*unsigned*" | head -n 1 || true)"
          if [ -n "$release_apk" ]; then
            cp "$release_apk" app-artifacts/android/ScanTreasure-Android-Release.apk
          fi

          release_aab="$(find web/android/app/build/outputs -type f -path "*/bundle/release/*.aab" | head -n 1 || true)"
          if [ -n "$release_aab" ]; then
            cp "$release_aab" app-artifacts/android/ScanTreasure-Android-Release.aab
          fi

          test "$(find app-artifacts/android -type f | wc -l)" -gt 0
          ls -la app-artifacts/android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScanTreasure-Android-Packages
          path: app-artifacts/android
          if-no-files-found: error
          retention-days: 30

  github-release:
    name: GitHub Release downloads
    needs: [android]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare stable download assets
        run: |
          mkdir -p release-upload
          find release-artifacts -type f \( -name "*.apk" -o -name "*.aab" -o -name "*-not-built.txt" \) -print -exec cp {} release-upload/ \;
          test "$(find release-upload -type f | wc -l)" -gt 0
          ls -la release-upload

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_NAME="$GITHUB_REF_NAME"
            RELEASE_TITLE="扫描宝 $GITHUB_REF_NAME"
            RELEASE_KIND="正式版本"
          else
            TAG_NAME="latest"
            RELEASE_TITLE="扫描宝 latest"
            RELEASE_KIND="最新构建"
          fi

          ASSET_BASE="https://github.com/zhouHongGui/scan-treasure/releases/download/$TAG_NAME"

          {
            echo "扫描宝 Android 下载包（$RELEASE_KIND）。"
            echo
            echo "直接下载链接："
            if [ -f release-upload/ScanTreasure-Android-Debug.apk ]; then
              echo "- Android Debug APK：$ASSET_BASE/ScanTreasure-Android-Debug.apk"
            fi
            if [ -f release-upload/ScanTreasure-Android-Release.apk ]; then
              echo "- Android Release APK：$ASSET_BASE/ScanTreasure-Android-Release.apk"
            else
              echo "- Android Release APK：暂未生成，需要配置 Android 签名 Secrets。"
            fi
            if [ -f release-upload/ScanTreasure-Android-Release.aab ]; then
              echo "- Android Release AAB：$ASSET_BASE/ScanTreasure-Android-Release.aab"
            fi
            echo
            echo "说明：当前自动发布只启用 Android。iOS 和 HarmonyOS 需要对应原生工程与签名/构建环境，暂不生成安装包。"
          } > release-notes.md

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" --target "$GITHUB_SHA" --title "$RELEASE_TITLE" --notes-file release-notes.md
          fi

          known_assets=(
            ScanTreasure-Android-Debug.apk
            ScanTreasure-Android-Release.apk
            ScanTreasure-Android-Release.aab
            ScanTreasure-HarmonyOS.hap
            ScanTreasure-HarmonyOS.app
            ScanTreasure-iOS.ipa
            scan-treasure-android-debug.apk
            scan-treasure-android-release.apk
            scan-treasure-android-release.aab
            scan-treasure-harmony.hap
            scan-treasure-harmony.app
            scan-treasure-ios.ipa
            android-release-not-built.txt
            harmony-not-built.txt
            ios-not-built.txt
          )
          for asset in "${known_assets[@]}"; do
            gh release delete-asset "$TAG_NAME" "$asset" -y >/dev/null 2>&1 || true
          done

          mapfile -d '' files < <(find release-upload -type f -print0)
          gh release upload "$TAG_NAME" "${files[@]}" --clobber
